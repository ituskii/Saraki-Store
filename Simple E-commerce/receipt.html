<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt | Saraki Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-white d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
        <img src="images/logo.png" alt="Saraki Store logo" style="height:28px; width:28px; object-fit:cover; border-radius:50%;">
        <span>Saraki Store</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent" aria-controls="navContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navContent">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="flex-grow-1 container py-5" style="max-width: 800px;">
    <h2 class="fw-bold mb-4">Payment Receipt</h2>

    <div class="card p-4" style="background: rgba(28,33,40,0.85); border: 1px solid #30363d; border-radius: 20px;">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <div style="color:#ffffff; opacity:1;">Status</div>
          <div class="fw-bold text-success" id="receiptStatus">Paid Successfully</div>
        </div>
        <div class="text-end">
          <div class="text-muted">Order ID</div>
          <div class="fw-bold" id="receiptOrderId" style="color:#ffffff;">—</div>
        </div>
      </div>

      <hr class="border-secondary">

      <h5 class="mb-3" style="color:#ffffff;">Summary</h5>
      <div class="d-flex justify-content-between mb-2" style="color:#ffffff; opacity:1; font-weight:600;">
        <span>Amount</span>
        <span id="receiptAmount" style="text-align:right;">$0.00</span>
      </div>

      <p class="mt-3 text-white-50 mb-0" id="receiptPayText">
        Payment method: —
      </p>

      <p class="text-white-50 mb-0" style="margin-top:0.75rem;">
        Thanks for your purchase! Your items have been removed from the cart.
      </p>

      <div class="d-grid gap-2 mt-4">
        <a class="btn btn-primary btn-lg" href="products.html">Back to Products</a>
        <a class="btn btn-outline-secondary btn-lg" href="index.html">Go to Home</a>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white py-4 mt-auto">
    <div class="container text-center">
      <p class="mb-0">&copy; <span id="year"></span> Saraki Store. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Read receipt data set during checkout
    const receipt = JSON.parse(localStorage.getItem('receiptData') || '{}');
    document.getElementById('receiptOrderId').textContent = receipt.orderId || '—';
    document.getElementById('receiptAmount').textContent = receipt.total != null ? `$${Number(receipt.total).toFixed(2)}` : '$0.00';

    // Display chosen payment method on receipt (set during checkout)
    const payMethod = receipt.payMethod || '—';
    const payText = document.getElementById('receiptPayText');
    if (payText) payText.textContent = `Payment method: ${payMethod}`;

    // Clear after showing
    // localStorage.removeItem('receiptData');
  </script>
</body>
</html>
