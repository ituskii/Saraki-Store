<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Saraki Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Custom Dark Form Styling */
        .form-control {
            background-color: #161b22 !important;
            border-color: #30363d !important;
            color: #ffffff !important;
        }
        .form-control:focus {
            border-color: #58a6ff !important;
            box-shadow: none !important;
        }
        .form-floating > label {
            color: #8b949e !important;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
                <img src="images/saraki.png" alt="Saraki Store logo" style="height:28px; width:28px; object-fit:cover; border-radius:50%;">
                <span>Saraki Store</span>
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 py-5">
        <div class="container" style="max-width: 600px;">
            <h2 class="text-center mb-4 text-white">Get In Touch</h2>
            <p class="text-center text-white-50 mb-4">Have questions? We'd love to hear from you.</p>
            
            <form id="contactForm" class="p-4 rounded border border-secondary bg-dark">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="name" placeholder="Name" required>
                    <label for="name">Your Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    <label for="email">Email Address</label>
                </div>
                <div class="form-floating mb-3">
                    <textarea class="form-control" id="message" placeholder="Message" style="height: 150px" required></textarea>
                    <label for="message">How can we help?</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 btn-lg">Send Message</button>
            </form>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto border-top border-secondary">
        <div class="container text-center">
            <p class="mb-0 text-white-50">&copy; <span id="year"></span> Saraki. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
